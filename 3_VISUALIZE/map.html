<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gebäude Visualisierung - Leipzig</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        
        /* Sidebar */
        #sidebar {
            width: 350px;
            background: #faf8f3; /* Helles Creme-Weiß */
            color: #2c3e50;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #1e3a5f; /* Dunkles Blau */
        }
        
        h2 {
            font-size: 18px;
            margin-top: 25px;
            margin-bottom: 15px;
            border-bottom: 2px solid #3498db; /* Mittleres Blau */
            padding-bottom: 5px;
            color: #2c5f8f; /* Mittel-dunkles Blau */
        }
        
        /* Stats Display */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        
        .stat-box {
            background: #e8f4f8; /* Sehr helles Blau */
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #b8d4e3; /* Helles Blau für Border */
        }
        
        .stat-label {
            font-size: 11px;
            color: #5a8fb8; /* Mittleres Blau */
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #1e6fa8; /* Kräftiges Blau */
        }
        
        .stat-value.large {
            font-size: 14px;
        }
        
        /* Map Container */
        #map {
            flex: 1;
            height: 100vh;
        }

        #data-file-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1200;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid #b8d4e3;
            border-radius: 8px;
            padding: 10px 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
            min-width: 280px;
        }

        #data-file-selector label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #2c5f8f;
            margin-bottom: 6px;
        }

        #data-file-select {
            width: 100%;
            padding: 8px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 12px;
            background: white;
            color: #2c3e50;
        }
        
        /* Loading Overlay */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(44, 62, 80, 0.95);
            padding: 30px 50px;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            z-index: 10000;
            display: none;
        }
        
        .loading.active {
            display: block;
        }
        
        /* Legend */
        .legend {
            background: white;
            padding: 15px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-size: 12px;
            line-height: 1.8;
        }
        
        .legend-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            margin-top: 2px;
            border: 1px solid #ccc;
            border-radius: 3px;
            flex-shrink: 0;
        }
        
        .legend-item > span:not(.legend-color) {
            flex: 1;
        }
        
        /* Layer-Selection Styling */
        #layer-selection label:hover {
            background: #d4e8f0 !important; /* Helles Blau beim Hover */
        }
        
        #layer-selection label {
            display: block;
            padding: 10px;
            margin-bottom: 5px;
            background: #e8f4f8; /* Sehr helles Blau */
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid #b8d4e3; /* Helles Blau für Border */
            color: #2c5f8f; /* Mittel-dunkles Blau für Text */
        }
        
        #layer-selection label input[type="radio"]:checked + span {
            font-weight: 600;
            color: #1e6fa8; /* Kräftiges Blau */
        }
        
        /* Scrollbar styling */
        #sidebar::-webkit-scrollbar {
            width: 8px;
        }
        
        #sidebar::-webkit-scrollbar-track {
            background: #f0f0f0;
        }
        
        #sidebar::-webkit-scrollbar-thumb {
            background: #5a8fb8; /* Mittleres Blau */
            border-radius: 4px;
        }
        
        #sidebar::-webkit-scrollbar-thumb:hover {
            background: #1e6fa8; /* Kräftiges Blau beim Hover */
        }
        
        /* Popup styling */
        .popup-content {
            font-family: 'Segoe UI', sans-serif;
            min-width: 250px;
        }
        
        .popup-content h3 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 16px;
        }
        
        .popup-content table {
            width: 100%;
            font-size: 13px;
            border-collapse: collapse;
        }
        
        .popup-content td {
            padding: 4px 8px;
            border-bottom: 1px solid #ecf0f1;
        }
        
        .popup-content td:first-child {
            font-weight: 600;
            color: #34495e;
            width: 50%;
        }
        
        .popup-content tr:last-child td {
            border-bottom: none;
        }
        
        /* Legend positioning - fixed in bottom right corner */
        #legend-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            max-width: 280px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 1000;
            font-size: 13px;
        }
        
        #legend-container h4 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 14px;
            font-weight: 600;
        }
        
        #legend-container p {
            font-size: 11px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }
        
        /* Scrollbar für Legende */
        #legend-container::-webkit-scrollbar {
            width: 6px;
        }
        
        #legend-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        
        #legend-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }
        
        #legend-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .btn-primary {
            background: #3498db;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1e6fa8;
        }
        
        .btn-secondary {
            background: #95a5a6;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #7f8c8d;
        }
        
        .parameter-edit-button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        
        .parameter-edit-button:hover {
            background: #1e6fa8;
        }

        /* Sanierung-Formular */
        .sanierung-group {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #b8d4e3;
            margin-bottom: 10px;
        }

        .sanierung-label {
            font-size: 12px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 6px;
            display: block;
        }

        .sanierung-input,
        .sanierung-select {
            width: 100%;
            padding: 8px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 12px;
            background: white;
        }

        .sanierung-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .sanierung-checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sanierung-checkbox-group label {
            font-size: 12px;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar">
        <h1>Heizwärmebedarf im Pilotgebiet Mockau</h1>
        <p style="font-size: 14px; color: #5a8fb8; margin-bottom: 20px;">
            Approximative Darstellung mithilfe von Gebäudetypologie
        </p>
        
        <h2>Layer-Auswahl</h2>
        <div id="layer-selection" style="margin-bottom: 20px;">
            <label>
                <input type="radio" name="layer" value="waermebedarf" style="margin-right: 8px;">
                <span>Wärmebedarf [kWh/a]</span>
            </label>
            <label>
                <input type="radio" name="layer" value="spez_waermebedarf" checked style="margin-right: 8px;">
                <span>Spezifischer Wärmebedarf [kWh/m²a]</span>
            </label>
            <label>
                <input type="radio" name="layer" value="gebaeudetyp" style="margin-right: 8px;">
                <span>Gebäudetyp</span>
            </label>
            <label>
                <input type="radio" name="layer" value="baualtersklasse" style="margin-right: 8px;">
                <span>Baualtersklasse</span>
            </label>
        </div>

        <div id="spez-scenario-selection" class="sanierung-group" style="display: none; margin-top: -8px;">
            <label class="sanierung-label" for="spez-scenario-select">Szenario (spez. Wärmebedarf)</label>
            <select id="spez-scenario-select" class="sanierung-select">
                <option value="unsaniert">Unsaniert (ga_qH)</option>
                <option value="groeger_saniert">Saniert nach Groeger-Annahme (ga_qH_saniert)</option>
                <option value="sim_saniert">Simulation Sanierung (ga_qH_sim_saniert)</option>
                <option value="sim_klima">Simulation Klima (ga_qH_sim_klima)</option>
            </select>
            <div id="spez-scenario-hint" style="font-size: 11px; color: #7f8c8d; margin-top: 6px;"></div>
        </div>
        
        <h2>Statistik</h2>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Gebäude gesamt</div>
                <div class="stat-value" id="stat-buildings">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Bezugsfläche</div>
                <div class="stat-value large" id="stat-area">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Wärmebedarf (Σ)</div>
                <div class="stat-value large" id="stat-waermebedarf">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Ø spez. Bedarf</div>
                <div class="stat-value large" id="stat-spez-waermebedarf">-</div>
            </div>
        </div>

        <h2>Sanierung</h2>
        <div class="sanierung-group">
            <label class="sanierung-label">Gespeicherte Annahmen</label>
            <select id="sanierung-saved" class="sanierung-select"></select>
        </div>

        <div class="sanierung-group">
            <label class="sanierung-label" for="sanierung-name">Name</label>
            <input id="sanierung-name" class="sanierung-input" type="text" value="Sanierungsszenario">

            <label class="sanierung-label" for="sanierung-density" style="margin-top: 10px;">Sanierungsdichte [%]</label>
            <input id="sanierung-density" class="sanierung-input" type="number" min="0" max="100" step="1" value="80">

            <label class="sanierung-label" for="sanierung-cycle" style="margin-top: 10px;">Sanierungszyklus</label>
            <select id="sanierung-cycle" class="sanierung-select"></select>

            <label class="sanierung-label" for="sanierung-depth" style="margin-top: 10px;">Sanierungstiefe</label>
            <select id="sanierung-depth" class="sanierung-select">
                <option value="vollsaniert" selected>Vollsaniert</option>
                <option value="teilsaniert">Teilsaniert (Dach/Wand/Fenster)</option>
                <option value="huelle">Gebäudehülle</option>
                <option value="fenster">Nur Fenster</option>
                <option value="dach">Nur Dach</option>
                <option value="wand">Nur Wand</option>
                <option value="keller">Nur Keller</option>
                <option value="tuer">Nur Tür</option>
                <option value="custom">Individuell</option>
            </select>

            <label class="sanierung-label" style="margin-top: 10px;">Gebäudeteile (für "Individuell")</label>
            <div class="sanierung-checkbox-group" id="sanierung-parts">
                <label><input type="checkbox" value="dach"> Dach</label>
                <label><input type="checkbox" value="geschossdecke"> Geschossdecke</label>
                <label><input type="checkbox" value="wand"> Wand</label>
                <label><input type="checkbox" value="keller"> Keller</label>
                <label><input type="checkbox" value="fenster"> Fenster</label>
                <label><input type="checkbox" value="tuer"> Tür</label>
            </div>

            <label class="sanierung-label" style="margin-top: 10px;">Gebäudetypen</label>
            <div class="sanierung-checkbox-group" id="sanierung-types">
                <label><input type="checkbox" value="all" checked> Alle</label>
                <label><input type="checkbox" value="EFH"> EFH</label>
                <label><input type="checkbox" value="RH"> RH</label>
                <label><input type="checkbox" value="MFH"> MFH</label>
                <label><input type="checkbox" value="GMH"> GMH</label>
                <label><input type="checkbox" value="HH"> HH</label>
            </div>

            <label class="sanierung-label" style="margin-top: 10px;">Baujahrbereich</label>
            <div class="sanierung-row">
                <input id="sanierung-baujahr-from" class="sanierung-input" type="number" placeholder="von">
                <input id="sanierung-baujahr-to" class="sanierung-input" type="number" placeholder="bis">
            </div>
        </div>

        <button class="parameter-edit-button" id="sanierung-simulate-btn" style="margin-top: 10px; background: #8e44ad;">
            Sanierung simulieren
        </button>

        <h2>Klima</h2>
        <div class="sanierung-group">
            <label class="sanierung-label" for="klima-scenario">Klimaszenario</label>
            <select id="klima-scenario" class="sanierung-select">
                <option value="rcp45">RCP 4.5</option>
                <option value="rcp85">RCP 8.5</option>
            </select>

            <label class="sanierung-label" for="klima-year" style="margin-top: 10px;">Jahr</label>
            <select id="klima-year" class="sanierung-select"></select>
        </div>

        <button class="parameter-edit-button" id="klima-simulate-btn" style="margin-top: 10px; background: #16a085;">
            Klima simulieren
        </button>
        
    </div>
    
    <!-- Map Container -->
    <div id="map"></div>

    <div id="data-file-selector">
        <label for="data-file-select">Aktiver Layer-Datensatz (GPKG)</label>
        <select id="data-file-select"></select>
    </div>
    
    <!-- Legend Container - Fixed in bottom left corner -->
    <div id="legend-container" class="legend">
        <p style="color: #7f8c8d; font-size: 11px; margin-bottom: 10px;">
            Wähle einen Layer aus, um die Legende zu sehen.
        </p>
    </div>
    
    <!-- Loading Overlay -->
    <div class="loading" id="loading">
        Lade Daten...
    </div>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Initialisiere Karte
        const map = L.map('map').setView([51.340199, 12.375130], 15);
        
        // OSM Basiskarte
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);
        
        // Layer-Gruppen
        const layers = {
            waermebedarf: null,
            spez_waermebedarf: null,
            gebaeudetyp: null,
            baualtersklasse: null
        };
        
        let currentLayer = null;
        let selectedDataFile = null;
        let activeSpezScenario = 'unsaniert';
        
        // Style-Funktion basierend auf Layer-Typ
        function getStyle(feature, layerType) {
            const color = feature.properties._layer_color || '#95a5a6';
            return {
                fillColor: color,
                weight: 1,
                opacity: 1,
                color: '#34495e',
                fillOpacity: 0.7
            };
        }
        
        // Popup-Funktion
        function onEachFeature(feature, layer) {
            const props = feature.properties;
            
            // Lade detaillierte Gebäudeinformationen beim Klick
            layer.on('click', function(e) {
                const buildingId = props.lod1_gml_id || props.identifikator || props.id || props.fid;
                if (buildingId) {
                    loadBuildingDetails(buildingId, e.latlng);
                } else {
                    showPopup(props, e.latlng);
                }
            });
        }
        
        // Lade Gebäude-Details von API
        function loadBuildingDetails(buildingId, latlng) {
            const params = new URLSearchParams({ spez_scenario: activeSpezScenario });
            fetch(`/api/building/${buildingId}?${params.toString()}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        console.error('Fehler:', data.error);
                        showPopup(null, latlng);
                    } else {
                        showPopup(data, latlng);
                    }
                })
                .catch(error => {
                    console.error('Fehler beim Laden der Gebäudedaten:', error);
                    showPopup(null, latlng);
                });
        }

        function updateSpezScenarioVisibility() {
            const wrapper = document.getElementById('spez-scenario-selection');
            wrapper.style.display = activeLayerType === 'spez_waermebedarf' ? 'block' : 'none';
        }

        function refreshSpezScenarioOptions() {
            return fetch('/api/spez-waermebedarf-scenarios')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        throw new Error(data.error);
                    }
                    const scenarioSelect = document.getElementById('spez-scenario-select');
                    const hint = document.getElementById('spez-scenario-hint');
                    const options = Array.isArray(data.options) ? data.options : [];
                    const optionMap = {};
                    options.forEach((item) => {
                        optionMap[item.id] = item;
                    });

                    Array.from(scenarioSelect.options).forEach((opt) => {
                        const meta = optionMap[opt.value];
                        const isAvailable = !!(meta && meta.available);
                        opt.disabled = !isAvailable;
                    });

                    const selectedMeta = optionMap[activeSpezScenario];
                    if (!selectedMeta || !selectedMeta.available) {
                        const firstAvailable = options.find((item) => item.available);
                        activeSpezScenario = firstAvailable ? firstAvailable.id : 'unsaniert';
                        scenarioSelect.value = activeSpezScenario;
                    } else {
                        scenarioSelect.value = activeSpezScenario;
                    }

                    const disabledOptions = options.filter((item) => !item.available);
                    if (disabledOptions.length > 0) {
                        const names = disabledOptions.map((item) => item.label).join(', ');
                        hint.textContent = `Nicht verfügbar im aktiven Datensatz: ${names}`;
                    } else {
                        hint.textContent = '';
                    }
                })
                .catch(error => {
                    console.error('Fehler beim Laden der Szenario-Optionen:', error);
                    document.getElementById('spez-scenario-hint').textContent = 'Szenario-Optionen konnten nicht geladen werden.';
                });
        }
        
        // Zeige Popup mit Gebäudeinformationen
        function showPopup(buildingData, latlng) {
            let content = '<div class="popup-content"><h3>Gebäude</h3><table>';
            
            if (buildingData) {
                if (buildingData.baujahr !== null && buildingData.baujahr !== undefined) {
                    content += `<tr><td><strong>Baujahr:</strong></td><td>${buildingData.baujahr}</td></tr>`;
                }
                if (buildingData.gebaeudetyp) {
                    content += `<tr><td><strong>Gebäudetyp:</strong></td><td>${buildingData.gebaeudetyp}</td></tr>`;
                }
                if (buildingData.bezugsflaeche !== null && buildingData.bezugsflaeche !== undefined) {
                    content += `<tr><td><strong>Bezugsfläche:</strong></td><td>${buildingData.bezugsflaeche.toFixed(0)} m²</td></tr>`;
                }
                if (buildingData.geschossanzahl !== null && buildingData.geschossanzahl !== undefined) {
                    content += `<tr><td><strong>Geschossanzahl:</strong></td><td>${buildingData.geschossanzahl}</td></tr>`;
                }
                if (buildingData.spez_waermebedarf_unsaniert !== null && buildingData.spez_waermebedarf_unsaniert !== undefined) {
                    content += `<tr style="background: #f8f9fa;"><td><strong>Spez. Wärmebedarf (unsaniert):</strong></td><td><strong>${buildingData.spez_waermebedarf_unsaniert.toFixed(1)} kWh/m²a</strong></td></tr>`;
                }
                if (buildingData.spez_waermebedarf_saniert !== null && buildingData.spez_waermebedarf_saniert !== undefined) {
                    content += `<tr style="background: #ecf0f1;"><td><strong>Spez. Wärmebedarf (saniert):</strong></td><td><strong>${buildingData.spez_waermebedarf_saniert.toFixed(1)} kWh/m²a</strong></td></tr>`;
                }
                if (buildingData.baualtersklasse) {
                    content += `<tr><td><strong>Baualtersklasse:</strong></td><td>${buildingData.baualtersklasse}</td></tr>`;
                }
            } else {
                content += '<tr><td colspan="2">Keine Details verfügbar</td></tr>';
            }
            
            content += '</table></div>';
            
            L.popup()
                .setLatLng(latlng)
                .setContent(content)
                .openOn(map);
        }
        
        // Lade Layer von API
        function loadLayer(layerType) {
            const loading = document.getElementById('loading');
            loading.classList.add('active');

            let apiUrl = `/api/layer/${layerType}`;
            if (layerType === 'spez_waermebedarf') {
                const params = new URLSearchParams({ spez_scenario: activeSpezScenario });
                apiUrl = `${apiUrl}?${params.toString()}`;
            }

            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        console.error('Fehler:', data.error);
                        alert('Fehler beim Laden des Layers: ' + data.error);
                        loading.classList.remove('active');
                        return;
                    }
                    
                    // Entferne vorherigen Layer
                    if (currentLayer) {
                        map.removeLayer(currentLayer);
                    }
                    
                    // Erstelle neuen Layer
                    currentLayer = L.geoJSON(data, {
                        style: (feature) => getStyle(feature, layerType),
                        onEachFeature: onEachFeature
                    }).addTo(map);
                    
                    // Zoom zu den Gebäuden
                    if (currentLayer.getBounds().isValid()) {
                        map.fitBounds(currentLayer.getBounds());
                    }
                    
                    // Update Legende
                    updateLegend(layerType, data);

        function populateDataFileSelect(files, currentFile) {
            const select = document.getElementById('data-file-select');
            select.innerHTML = '';

            files.forEach((file) => {
                const option = document.createElement('option');
                option.value = file;
                option.textContent = file;
                select.appendChild(option);
            });

            if (files.length === 0) {
                const option = document.createElement('option');
                option.value = '';
                option.textContent = 'Keine .gpkg gefunden';
                select.appendChild(option);
                select.disabled = true;
                selectedDataFile = null;
                return;
            }

            select.disabled = false;
            const effectiveCurrent = files.includes(currentFile) ? currentFile : files[0];
            select.value = effectiveCurrent;
            selectedDataFile = effectiveCurrent;
        }

        function loadAvailableDataFiles() {
            return fetch('/api/data-files')
                .then(response => response.json())
                .then(data => {
                    if (data.error && !Array.isArray(data.files)) {
                        throw new Error(data.error);
                    }
                    const files = Array.isArray(data.files) ? data.files : [];
                    populateDataFileSelect(files, data.current_file);
                })
                .catch(error => {
                    console.error('Fehler beim Laden der GPKG-Dateiliste:', error);
                    const select = document.getElementById('data-file-select');
                    select.innerHTML = '<option value="">Fehler beim Laden</option>';
                    select.disabled = true;
                    selectedDataFile = null;
                });
        }

        function selectDataFile(filename) {
            if (!filename) {
                return Promise.resolve(false);
            }

            return fetch('/api/data-select', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        throw new Error(data.error);
                    }
                    selectedDataFile = data.current_file;
                    return true;
                })
                .catch(error => {
                    console.error('Fehler beim Umschalten des Datensatzes:', error);
                    alert('Datensatz konnte nicht geladen werden: ' + error.message);
                    return false;
                });
        }

        // Lade Statistiken
        function loadStats() {
            const params = new URLSearchParams({ spez_scenario: activeSpezScenario });
            fetch(`/api/stats?${params.toString()}`)
                .then(response => response.json())
                .then(stats => {
                    document.getElementById('stat-buildings').textContent = stats.total_buildings || '-';
                    document.getElementById('stat-area').textContent = 
                        stats.total_area ? (stats.total_area / 1000).toFixed(1) + ' Tm²' : '-';
                    document.getElementById('stat-waermebedarf').textContent = 
                        stats.waermebedarf_total ? (stats.waermebedarf_total / 1000).toFixed(0) + ' MWh/a' : '-';
                    document.getElementById('stat-spez-waermebedarf').textContent = 
                        stats.spez_waermebedarf_mean ? stats.spez_waermebedarf_mean.toFixed(1) + ' kWh/m²a' : '-';

        // Sanierungsannahmen
        let sanierungAssumptions = [];

        function getSelectedBuildingTypes() {
            const typeInputs = document.querySelectorAll('#sanierung-types input[type="checkbox"]');
            const selected = [];
            let allSelected = false;
            typeInputs.forEach(input => {
                if (input.value === 'all' && input.checked) {
                    allSelected = true;
                } else if (input.checked) {
                    selected.push(input.value);
                }
            });
            return allSelected ? [] : selected;
        }

        function getSelectedParts() {
            const partInputs = document.querySelectorAll('#sanierung-parts input[type="checkbox"]');
            return Array.from(partInputs)
                .filter(input => input.checked)
                .map(input => input.value);
        }

        function getSanierungFormData() {
            return {
                name: document.getElementById('sanierung-name').value,
                density: parseFloat(document.getElementById('sanierung-density').value),
                cycle: document.getElementById('sanierung-cycle').value,
                depth: document.getElementById('sanierung-depth').value,
                building_types: getSelectedBuildingTypes(),
                baujahr_from: document.getElementById('sanierung-baujahr-from').value,
                baujahr_to: document.getElementById('sanierung-baujahr-to').value,
                custom_parts: getSelectedParts()
            };
        }

        function applySanierungFormData(data) {
            if (!data) return;
            document.getElementById('sanierung-name').value = data.name || '';
            document.getElementById('sanierung-density').value = data.density ?? 0;
            document.getElementById('sanierung-cycle').value = data.cycle || '2002-2009';
            document.getElementById('sanierung-depth').value = data.depth || 'vollsaniert';
            document.getElementById('sanierung-baujahr-from').value = data.baujahr_from ?? '';
            document.getElementById('sanierung-baujahr-to').value = data.baujahr_to ?? '';

            const typeInputs = document.querySelectorAll('#sanierung-types input[type="checkbox"]');
            typeInputs.forEach(input => {
                if (input.value === 'all') {
                    input.checked = !data.building_types || data.building_types.length === 0;
                } else {
                    input.checked = data.building_types?.includes(input.value) || false;
                }
            });

            const partInputs = document.querySelectorAll('#sanierung-parts input[type="checkbox"]');
            partInputs.forEach(input => {
                input.checked = data.custom_parts?.includes(input.value) || false;
            });
        }

        function refreshSanierungSelect() {
            const select = document.getElementById('sanierung-saved');
            select.innerHTML = '';
            const placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.textContent = 'Bitte auswählen...';
            select.appendChild(placeholder);

            sanierungAssumptions.forEach(item => {
                const option = document.createElement('option');
                option.value = item.id;
                option.textContent = item.name || item.id;
                select.appendChild(option);
            });
        }

        function loadSanierungAssumptions() {
            fetch('/api/sanierung-assumptions')
                .then(response => response.json())
                .then(data => {
                    sanierungAssumptions = Array.isArray(data) ? data : [];
                    refreshSanierungSelect();
                })
                .catch(error => console.error('Fehler beim Laden der Sanierungsannahmen:', error));
        }

        function loadSanierungZyklen() {
            const select = document.getElementById('sanierung-cycle');
            select.innerHTML = '';

            fetch('/api/sanierung-zyklen')
                .then(response => response.json())
                .then(data => {
                    const cycles = Array.isArray(data) ? data : [];
                    cycles.forEach((cycle, idx) => {
                        const option = document.createElement('option');
                        option.value = cycle;
                        option.textContent = cycle;
                        if (idx === cycles.length - 1) {
                            option.selected = true;
                        }
                        select.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('Fehler beim Laden der Sanierungszyklen:', error);
                });
        }

        function loadSelectedSanierungAssumption() {
            const select = document.getElementById('sanierung-saved');
            const id = select.value;
            if (!id) return;
            const item = sanierungAssumptions.find(a => a.id === id);
            if (item) {
                applySanierungFormData(item);
            }
        }

        function runSanierungSimulation() {
            const loading = document.getElementById('loading');
            const btn = document.getElementById('sanierung-simulate-btn');

            if (btn.disabled) return;
            if (!confirm('Sanierungssimulation durchführen und GPKG neu berechnen?')) return;

            loading.classList.add('active');
            btn.disabled = true;
            btn.textContent = 'Berechne...';

            const payload = { assumption: getSanierungFormData() };
            fetch('/api/sanierung-simulate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert('Fehler bei Sanierung: ' + data.error);
                    return;
                }

                if (currentLayer) {
                    loadLayer(activeLayerType);
                }
                loadStats();
                loadAvailableDataFiles().then(() => refreshSpezScenarioOptions());
                alert(`Sanierung erfolgreich!\n\nKandidaten: ${data.statistics.candidates}\nAngewandt: ${data.statistics.applied}\nNicht zugeordnet: ${data.statistics.unmatched}`);
            })
            .catch(error => {
                console.error('Fehler bei Sanierung:', error);
                alert('Fehler bei Sanierung: ' + error.message);
            })
            .finally(() => {
                loading.classList.remove('active');
                btn.disabled = false;
                btn.textContent = 'Sanierung simulieren';
            });
        }

        document.getElementById('sanierung-simulate-btn').addEventListener('click', runSanierungSimulation);
        document.getElementById('sanierung-saved').addEventListener('change', loadSelectedSanierungAssumption);

                if (input.value === 'all' && input.checked) {
                    document.querySelectorAll('#sanierung-types input[type="checkbox"]').forEach(i => {
                        if (i.value !== 'all') i.checked = false;
                    });
                } else if (input.value !== 'all' && input.checked) {
                    allInput.checked = false;
                }
            });
        });

        loadSanierungAssumptions();

            const select = document.getElementById('klima-year');
            const scenario = document.getElementById('klima-scenario').value;
            const yearsByScenario = klimaOptionsCache?.years_by_scenario || {};
            const years = yearsByScenario[scenario] || [];
            select.innerHTML = '';

            years.forEach((year) => {
                const option = document.createElement('option');
                option.value = String(year);
                option.textContent = String(year);
                select.appendChild(option);
            });

            if (years.length > 0) {
                const preferredYear = 2030;
                const selectedYear = years.includes(preferredYear) ? preferredYear : years[Math.floor(years.length / 2)];
                select.value = String(selectedYear);
            }
        }

        function loadKlimaOptions() {
            fetch('/api/klima-options')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        console.error('Fehler bei Klima-Optionen:', data.error);
                        return;
                    }
                    klimaOptionsCache = data;
                    const scenarioSelect = document.getElementById('klima-scenario');
                    const currentScenario = scenarioSelect.value;
                    scenarioSelect.innerHTML = '';

                    (data.scenarios || []).forEach((scenario) => {
                        const option = document.createElement('option');
                        option.value = scenario;
                        option.textContent = scenario.toUpperCase().replace('RCP', 'RCP ');
                        scenarioSelect.appendChild(option);
                    });

                    if ((data.scenarios || []).includes(currentScenario)) {
                        scenarioSelect.value = currentScenario;
                    } else if ((data.scenarios || []).length > 0) {
                        scenarioSelect.value = data.scenarios[0];
                    }

                    populateKlimaYears();
                })
                .catch(error => console.error('Fehler beim Laden der Klima-Optionen:', error));
        }

        function getKlimaFormData() {
            return {
                scenario: document.getElementById('klima-scenario').value,
                year: parseInt(document.getElementById('klima-year').value, 10)
            };
        }

        function runKlimaSimulation() {
            const loading = document.getElementById('loading');
            const btn = document.getElementById('klima-simulate-btn');

            if (btn.disabled) return;
            if (!confirm('Klimaszenario anwenden und GPKG neu berechnen?')) return;

            loading.classList.add('active');
            btn.disabled = true;
            btn.textContent = 'Berechne...';

            const payload = { assumption: getKlimaFormData() };
            fetch('/api/klima-simulate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert('Fehler bei Klima-Simulation: ' + data.error);
                    return;
                }

                if (currentLayer) {
                    loadLayer(activeLayerType);
                }
                loadStats();
                loadAvailableDataFiles().then(() => refreshSpezScenarioOptions());
                alert(
                    `Klima-Simulation erfolgreich!\n\n` +
                    `HDD: ${data.statistics.hdd.toFixed(2)}\n` +
                    `RHDD: ${data.statistics.rhdd.toFixed(2)}\n` +
                    `G_Hor: ${data.statistics.g_hor.toFixed(2)}\n` +
                    `G_Hor_HD: ${data.statistics.g_hor_hd.toFixed(2)}\n` +
                    `G_E_HD: ${data.statistics.g_e_hd.toFixed(2)}\n` +
                    `G_S_HD: ${data.statistics.g_s_hd.toFixed(2)}\n` +
                    `G_W_HD: ${data.statistics.g_w_hd.toFixed(2)}\n` +
                    `G_N_HD: ${data.statistics.g_n_hd.toFixed(2)}\n` +
                    `Zugeordnet: ${data.statistics.matched}\n` +
                    `Nicht zugeordnet: ${data.statistics.unmatched}`
                );
            })
            .catch(error => {
                console.error('Fehler bei Klima-Simulation:', error);
                alert('Fehler bei Klima-Simulation: ' + error.message);
            })
            .finally(() => {
                loading.classList.remove('active');
                btn.disabled = false;
                btn.textContent = 'Klima simulieren';
            });
        }

        document.getElementById('klima-simulate-btn').addEventListener('click', runKlimaSimulation);
        document.getElementById('klima-scenario').addEventListener('change', populateKlimaYears);
        document.getElementById('spez-scenario-select').addEventListener('change', function() {
            activeSpezScenario = this.value;
            if (activeLayerType === 'spez_waermebedarf') {
                loadLayer(activeLayerType);
            }
            loadStats();
        });
        document.getElementById('data-file-select').addEventListener('change', function() {
            const filename = this.value;
            if (!filename || filename === selectedDataFile) {
                return;
            }
            selectDataFile(filename).then((ok) => {
                if (ok) {
                    refreshSpezScenarioOptions().then(() => {
                        loadLayer(activeLayerType);
                        loadStats();
                    });
                }
            });
        });
        loadKlimaOptions();
    </script>
</body>
</html>
